<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0"
	/>
	<title>q5play Template</title>
	<link
		rel="stylesheet"
		href="style/style.css"
	/>
	<!-- Core -->
	<script src="https://q5js.org/q5.min.js"></script>
	<script src="https://q5play.org/q5play.min.js"></script>
	<!-- Physics -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/toxiclibsjs@0.3.3/build/toxiclibs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/detect-collisions@9/dist/detect-collisions.min.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
	<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
	<!-- Input -->
	<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

	<script src="https://unpkg.com/xstate@4/dist/xstate.web.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/victor@1.1.0/build/victor.min.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
	<!-- Debug -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/Stats.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/eruda"></script>

<body>
	<script>
		eruda.init();
	</script>
	<!-- App -->
	<script src="js/helpers.js"></script>
	<script src="js/theme.js"></script>
	<script src="js/main.js"></script>

</html>
